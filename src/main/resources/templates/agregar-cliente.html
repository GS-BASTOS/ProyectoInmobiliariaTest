<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Nuevo cliente')}"></head>
<style>
  .section-block {
    padding:18px 20px;
    border-radius:14px;
    border:1px solid var(--line);
    background:#faf8f4;
    margin-bottom:20px;
  }
  .section-block-title {
    font-size:11px; font-weight:700; letter-spacing:1.2px;
    text-transform:uppercase; color:var(--muted);
    margin-bottom:14px;
    display:flex; align-items:center; gap:6px;
  }
</style>
<body>
<nav th:replace="~{fragments :: nav}"></nav>

<div class="container">
  <div class="card">

    <!-- CABECERA -->
    <div style="display:flex; align-items:flex-end; justify-content:space-between;
                gap:12px; flex-wrap:wrap; margin-bottom:4px;">
      <div>
        <h2 style="margin-bottom:4px;">Nuevo cliente potencial</h2>
        <div class="small">Cliente sin inmueble asignado aún. Podrás añadirle interacciones desde su ficha.</div>
      </div>
      <a class="btn btn-secondary" th:href="@{/clientes}"
         style="font-size:13px; padding:9px 16px;">← Volver</a>
    </div>

    <hr style="border:none; border-top:1px solid var(--line); margin:14px 0 20px;"/>

    <form th:action="@{/clientes/nuevo}" th:object="${form}" method="post">

      <!-- ERRORES GLOBALES -->
      <div class="global-errors" th:if="${#fields.hasGlobalErrors()}"
           style="margin-bottom:16px; padding:12px 16px; background:#ffebee;
                  border-left:4px solid #b42318; border-radius:8px; font-size:13px; color:#b42318;">
        <div th:each="e : ${#fields.globalErrors()}" th:text="${e}">Error</div>
      </div>

      <!-- BLOQUE 1: IDENTIDAD -->
      <div class="section-block">
        <div class="section-block-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
               fill="none" stroke="var(--muted)" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Identidad del cliente
        </div>

        <div class="grid">
          <div>
            <label>Tipo de cliente</label>
            <select th:field="*{clientType}">
              <option th:each="t : ${clientTypes}" th:value="${t}" th:text="${t}"></option>
            </select>
          </div>
          <div>
            <label>Nombre completo <span style="color:#b42318;">*</span></label>
            <input th:field="*{fullName}" placeholder="Nombre y apellidos..."/>
            <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
          </div>
        </div>

        <div class="grid" style="margin-top:12px;">
          <div>
            <label>Empresa <span style="color:var(--muted); font-weight:400;">(opcional)</span></label>
            <input th:field="*{companyName}" placeholder="Nombre de la empresa..."/>
          </div>
          <div>
            <label>Código Solvia</label>
            <input th:field="*{solviaCode}" placeholder="Ej: SOLVIA-123"/>
          </div>
        </div>

        <!-- ── NO MOLESTAR ── -->
        <div style="margin-top:14px; padding-top:12px; border-top:1px solid var(--line);">
          <label style="display:inline-flex; align-items:center; gap:8px;
                 cursor:pointer; font-size:13px; margin:0;">
            <input type="checkbox" th:field="*{noMolestar}"
                   style="width:16px; height:16px; cursor:pointer; accent-color:#7b1fa2;"/>
            <span style="font-weight:700; color:#7b1fa2;">🚫 No molestar</span>
            <span style="font-size:11px; color:var(--muted); font-weight:400;">
              (el cliente no quiere llamadas ni emails)
            </span>
          </label>
        </div>
      </div>

      <!-- BLOQUE 2: TELÉFONOS Y EMAILS -->
      <div class="section-block">
        <div class="section-block-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
               fill="none" stroke="var(--muted)" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          Teléfonos y emails
        </div>

        <div class="grid-3">
          <div>
            <label>Teléfono 1</label>
            <input th:field="*{phone1}" placeholder="600 000 000"/>
            <div class="field-error" th:if="${#fields.hasErrors('phone1')}" th:errors="*{phone1}"></div>
          </div>
          <div>
            <label>Teléfono 2</label>
            <input th:field="*{phone2}" placeholder="600 000 000"/>
          </div>
          <div>
            <label>Teléfono 3</label>
            <input th:field="*{phone3}" placeholder="600 000 000"/>
          </div>
        </div>

        <div class="grid" style="margin-top:12px;">
          <div>
            <label>Email 1</label>
            <input th:field="*{email1}" placeholder="correo@ejemplo.com"/>
            <div class="field-error" th:if="${#fields.hasErrors('email1')}" th:errors="*{email1}"></div>
          </div>
          <div>
            <label>Email 2</label>
            <input th:field="*{email2}" placeholder="correo@ejemplo.com"/>
            <div class="field-error" th:if="${#fields.hasErrors('email2')}" th:errors="*{email2}"></div>
          </div>
        </div>
      </div>

      <!-- BLOQUE 3: QUÉ BUSCA -->
      <div class="section-block">
        <div class="section-block-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
               fill="none" stroke="var(--muted)" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          ¿Qué busca?
        </div>
        <label style="font-weight:600; font-size:13px;">Motivo de contacto</label>
        <div class="small" style="margin-bottom:8px; color:var(--muted);">
          Describe brevemente qué inmueble busca, presupuesto o cualquier detalle relevante.
        </div>
        <textarea th:field="*{motivoContacto}" rows="3"
                  placeholder="Ej: Busca piso de 3 habitaciones en Madrid, presupuesto 200k. Le interesa zona norte..."></textarea>
        <div class="field-error" th:if="${#fields.hasErrors('motivoContacto')}" th:errors="*{motivoContacto}"></div>
      </div>

      <!-- ACCIONES -->
      <div class="actions" style="justify-content:flex-end;">
        <a class="btn btn-secondary" th:href="@{/clientes}"
           style="font-size:13px; padding:9px 16px;">Cancelar</a>
        <button type="submit"
                style="display:inline-flex; align-items:center; gap:7px;
                       font-size:13px; padding:9px 20px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Guardar cliente
        </button>
      </div>

    </form>
  </div>
</div>
</body>
</html>
