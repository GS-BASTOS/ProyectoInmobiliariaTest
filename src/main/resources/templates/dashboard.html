<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Panel')}"></head>
<style>
  .dash-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 18px;
    align-items: start;
  }
  .dash-left  { display: flex; flex-direction: column; gap: 18px; }
  .dash-right { display: flex; flex-direction: column; gap: 18px; }

  /* ── Bienvenida ── */
  .welcome-box {
    background: #111111;
    background: linear-gradient(135deg, #111111 0%, #2a2a2a 100%);
    color: #fff;
    border-radius: 16px;
    padding: 28px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .welcome-box h1 { margin: 0; font-size: 26px; font-weight: 800; }
  .welcome-box p  { margin: 6px 0 0; color: rgba(255,255,255,.55); font-size: 14px; text-transform: capitalize; }

  /* ── Mini calendario ── */
  .mini-cal {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,.05);
  }
  .mini-cal .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .mini-cal .cal-header span { font-weight: 700; font-size: 14px; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7,1fr);
    gap: 3px; text-align: center;
  }
  .cal-grid .day-name {
    font-size: 10px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; padding: 4px 0;
  }
  .cal-grid .day {
    font-size: 12px; padding: 5px 0; border-radius: 8px; cursor: default;
    color: var(--text);
  }
  .cal-grid .day.today {
    background: #111; color: #fff; font-weight: 800;
  }
  .cal-grid .day.empty { visibility: hidden; }

  /* ── Secciones ── */
  .section-title {
    font-size:11px; font-weight:700; letter-spacing:1.2px;
    text-transform:uppercase; color:var(--muted); margin-bottom:12px;
    display:flex; align-items:center; gap:6px;
  }

  /* ── Notas agenda ── */
  .note-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--line);
  }
  .note-item:last-child { border-bottom: none; }
  .note-date {
    font-size: 11px; font-weight: 700; color: var(--muted);
    white-space: nowrap; min-width: 72px;
    background: #f5f5f5; border-radius: 6px;
    padding: 3px 8px; text-align: center;
  }
  .note-content { font-size: 13px; flex: 1; line-height: 1.5; }
  .note-del {
    background: none; border: none; color: #ccc; padding: 0;
    cursor: pointer; font-size: 16px; line-height: 1; flex-shrink: 0;
  }
  .note-del:hover { color: #b42318; background: none; }

  /* ── Visitas de hoy ── */
  .visit-today-item {
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 13px;
    transition: box-shadow .15s;
  }
  .visit-today-item:last-child { margin-bottom: 0; }
  .visit-today-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .visit-hour {
    font-weight: 800; color: #111; font-size: 16px;
    display: inline-flex; align-items: center; gap: 6px;
  }

  /* ── Chart ── */
  .chart-wrap { position: relative; height: 220px; }

  /* ── Usuarios ── */
  .user-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 13px;
  }
  .user-row:last-child { border-bottom: none; }

  /* ── Modales ── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.38); z-index: 2000;
    align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal-box {
    background: #fff; border-radius: 16px; padding: 28px;
    width: 100%; max-width: 440px;
    box-shadow: 0 16px 48px rgba(0,0,0,.18);
  }
  .modal-box h3 { margin: 0 0 18px; font-size: 17px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }

  @media (max-width: 900px) {
    .dash-grid { grid-template-columns: 1fr; }
  }
</style>
<body>

<meta name="_csrf"        th:content="${_csrf.token}"/>
<meta name="_csrf_header" th:content="${_csrf.headerName}"/>

<nav th:replace="~{fragments :: nav}"></nav>

<!-- ══ MODAL NUEVA NOTA ══ -->
<div class="modal-backdrop" id="modalNota">
  <div class="modal-box">
    <h3>📝 Nueva anotación</h3>
    <form method="post" th:action="@{/agenda/nueva}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <label>Fecha</label>
      <input type="date" name="noteDate" id="notaFecha" required style="margin:0 0 12px;"/>
      <label>Nota</label>
      <textarea name="content" rows="4" placeholder="Escribe tu anotación..."
                style="margin:0;" required></textarea>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary"
                onclick="document.getElementById('modalNota').classList.remove('open')">
          Cancelar
        </button>
        <button type="submit">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- ══ MODAL REGISTRAR USUARIO (solo ADMIN) ══ -->
<div class="modal-backdrop" id="modalUsuario"
     th:if="${appUser.role == 'ADMIN'}">
  <div class="modal-box">
    <h3>👤 Registrar usuario</h3>
    <form method="post" th:action="@{/usuarios/registrar}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <label>Nombre para mostrar</label>
      <input type="text" name="displayName" required style="margin:0 0 12px;" placeholder="Ej: María García"/>
      <label>Usuario (login)</label>
      <input type="text" name="username" required style="margin:0 0 12px;" placeholder="Ej: mgarcia"/>
      <label>Contraseña</label>
      <input type="password" name="password" required style="margin:0;" placeholder="Mínimo 8 caracteres"/>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary"
                onclick="document.getElementById('modalUsuario').classList.remove('open')">
          Cancelar
        </button>
        <button type="submit">Registrar</button>
      </div>
    </form>
  </div>
</div>

<div class="container">
  <div class="dash-grid">

    <!-- ══ COLUMNA IZQUIERDA ══ -->
    <div class="dash-left">

      <!-- Bienvenida -->
      <div class="welcome-box">
        <div>
          <h1 th:text="'Bienvenido, ' + ${appUser.displayName} + ' 👋'">Bienvenido</h1>
          <p th:text="${#temporals.format(today, 'EEEE, d MMMM yyyy')}">Lunes, 23 febrero 2026</p>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <a class="btn" th:href="@{/interesados}"
             style="background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.25);
                    color:#fff; font-size:12px; padding:8px 16px;">
            📋 Interesados
          </a>
          <a class="btn" th:href="@{/clientes}"
             style="background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.25);
                    color:#fff; font-size:12px; padding:8px 16px;">
            👥 Clientes
          </a>
        </div>
      </div>

      <!-- Agenda -->
      <div class="card">
        <div style="display:flex; align-items:center; justify-content:space-between;
                    margin-bottom:14px; flex-wrap:wrap; gap:10px;">
          <div class="section-title" style="margin:0;">
            📓 Agenda
          </div>
          <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <form method="get" th:action="@{/dashboard}"
                  style="display:flex; gap:6px; align-items:center; margin:0;">
              <input type="date" name="agendaDate"
                     th:value="${agendaDate}"
                     style="margin:0; font-size:12px; padding:6px 10px; width:auto;"/>
              <button type="submit" style="font-size:12px; padding:6px 12px;">Filtrar</button>
              <a th:href="@{/dashboard}"
                 style="font-size:12px; color:var(--muted); text-decoration:none;
                        padding:6px 8px; border-radius:6px;"
                 title="Limpiar filtro">✕</a>
            </form>
            <button type="button" onclick="openNotaModal()"
                    style="font-size:12px; padding:7px 14px;">
              + Nueva nota
            </button>
          </div>
        </div>

        <p th:if="${#lists.isEmpty(notes)}"
           style="color:var(--muted); font-size:13px; margin:0; text-align:center;
                  padding:20px 0;">
          No hay anotaciones.
        </p>

        <div th:each="n : ${notes}" class="note-item">
          <div class="note-date"
               th:text="${#temporals.format(n.noteDate, 'dd/MM')}">01/01</div>
          <div class="note-content" th:text="${n.content}">Nota...</div>
          <button class="note-del"
                  th:attr="data-id=${n.id}"
                  onclick="deleteNota(this)" title="Eliminar">✕</button>
        </div>
      </div>

      <!-- Gráfico inmuebles -->
      <div class="card">
        <div class="section-title">🏠 Inmuebles con más interacciones</div>
        <div class="chart-wrap">
          <canvas id="chartInmuebles"></canvas>
        </div>
      </div>

      <!-- Gestión de usuarios (solo ADMIN) -->
      <div class="card" th:if="${appUser.role == 'ADMIN'}">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
          <div class="section-title" style="margin:0;">👥 Usuarios del sistema</div>
          <button type="button"
                  onclick="document.getElementById('modalUsuario').classList.add('open')"
                  style="font-size:12px; padding:7px 14px;">
            + Registrar usuario
          </button>
        </div>
        <div th:each="u : ${allUsers}" class="user-row">
          <div>
            <strong th:text="${u.displayName}">Nombre</strong>
            <span style="color:var(--muted); font-size:12px;"
                  th:text="' · @' + ${u.username}"> · @user</span>
            <span th:if="${u.role == 'ADMIN'}"
                  style="font-size:10px; background:#111; color:#fff;
                         border-radius:4px; padding:1px 6px; margin-left:6px; font-weight:700;">
              ADMIN
            </span>
          </div>
          <button th:if="${u.username != appUser.username}"
                  type="button"
                  th:attr="data-id=${u.id}"
                  onclick="deleteUser(this)"
                  style="background:#b42318; border-color:#b42318;
                         font-size:11px; padding:5px 10px;">
            Eliminar
          </button>
        </div>
      </div>

    </div>

    <!-- ══ COLUMNA DERECHA ══ -->
    <div class="dash-right">

      <!-- Mini calendario -->
      <div class="mini-cal">
        <div class="cal-header">
          <span id="calMonthYear"></span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <!-- Visitas de hoy -->
      <div class="card">
        <div class="section-title">
          📅 Visitas para hoy
        </div>
        <p th:if="${#lists.isEmpty(todayVisits)}"
           style="color:var(--muted); font-size:13px; margin:0; text-align:center; padding:16px 0;">
          No hay visitas programadas hoy.
        </p>
        <div th:each="v : ${todayVisits}" class="visit-today-item">
          <div>
            <span class="visit-hour">
              🕐 <span th:text="${#temporals.format(v.visitAt, 'HH:mm')}">10:00</span>
            </span>
          </div>
          <div style="margin-top:5px;">
            <a th:href="@{|/clientes/${v.client.id}|}"
               th:text="${v.client.fullName}"
               style="font-weight:700; text-decoration:none; color:inherit; font-size:13px;"></a>
          </div>
          <div style="font-size:12px; color:var(--muted); margin-top:2px;
                      display:flex; align-items:center; gap:4px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <a th:href="@{|/inmuebles/${v.property.id}|}"
               th:text="${v.property.propertyCode}"
               style="text-decoration:none; color:var(--muted); font-weight:600;"></a>
            <span th:if="${v.property.municipality != null}"
                  th:text="' · ' + ${v.property.municipality}"></span>
          </div>
          <div th:if="${v.notes != null and !#strings.isEmpty(v.notes)}"
               style="font-size:11px; color:#888; margin-top:4px; padding:4px 8px;
                      background:#f5f5f5; border-radius:6px;"
               th:text="${v.notes}"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
  /*<![CDATA[*/
  const TOP_PROPS = /*[[${topProps}]]*/ [];
  const TODAY_STR = /*[[${#temporals.format(today, 'yyyy-MM-dd')}]]*/ '';
  /*]]>*/
</script>
<script>
  function getCsrf() {
    return {
      token:  document.querySelector('meta[name="_csrf"]').getAttribute('content'),
      header: document.querySelector('meta[name="_csrf_header"]').getAttribute('content')
    };
  }

  /* ══ MINI CALENDARIO ══ */
  (function() {
    const today    = new Date(TODAY_STR + 'T00:00:00');
    const year     = today.getFullYear();
    const month    = today.getMonth();
    const days     = new Date(year, month + 1, 0).getDate();
    const firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
    const months   = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                      'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

    document.getElementById('calMonthYear').textContent = months[month] + ' ' + year;
    const grid = document.getElementById('calGrid');

    ['L','M','X','J','V','S','D'].forEach(d => {
      const el = document.createElement('div');
      el.className = 'day-name'; el.textContent = d;
      grid.appendChild(el);
    });
    for (let i = 0; i < firstDow; i++) {
      const el = document.createElement('div'); el.className = 'day empty'; grid.appendChild(el);
    }
    for (let d = 1; d <= days; d++) {
      const el = document.createElement('div');
      el.className = 'day' + (d === today.getDate() ? ' today' : '');
      el.textContent = d;
      grid.appendChild(el);
    }
  })();

  /* ══ GRÁFICO INMUEBLES ══ */
  (function() {
    const labels = TOP_PROPS.map(p => p[0]);
    const data   = TOP_PROPS.map(p => p[1]);
    const COLORS = ['#111111','#f5c800','#b42318','#168a53','#b02cff',
                    '#e07a18','#5aa7ff','#ff4d6d','#00b4d8','#6d6875'];
    const ctx = document.getElementById('chartInmuebles').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Interacciones',
          data,
          backgroundColor: data.map((_, i) => COLORS[i % COLORS.length]),
          borderRadius: 6,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { precision: 0 },
               grid: { color: 'rgba(0,0,0,.06)' } },
          x: { ticks: { font: { size: 11 } },
               grid: { display: false } }
        }
      }
    });
  })();

  /* ══ MODAL NOTA ══ */
  function openNotaModal() {
    document.getElementById('notaFecha').value = new Date().toISOString().split('T')[0];
    document.getElementById('modalNota').classList.add('open');
  }
  document.getElementById('modalNota').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
  const modalUsuario = document.getElementById('modalUsuario');
  if (modalUsuario) {
    modalUsuario.addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });
  }

  /* ══ ELIMINAR NOTA ══ */
  async function deleteNota(btn) {
    if (!confirm('¿Eliminar esta nota?')) return;
    const csrf = getCsrf();
    const res  = await fetch('/agenda/' + btn.getAttribute('data-id') + '/eliminar', {
      method: 'POST',
      headers: { [csrf.header]: csrf.token }
    });
    if (res.ok) btn.closest('.note-item').remove();
  }

  /* ══ ELIMINAR USUARIO ══ */
  async function deleteUser(btn) {
    if (!confirm('¿Eliminar este usuario? Esta acción no se puede deshacer.')) return;
    const csrf = getCsrf();
    const res  = await fetch('/usuarios/' + btn.getAttribute('data-id') + '/eliminar', {
      method: 'POST',
      headers: { [csrf.header]: csrf.token }
    });
    if (res.ok) btn.closest('.user-row').remove();
  }
</script>
</body>
</html>
