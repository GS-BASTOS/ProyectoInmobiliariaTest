<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Acceso · Solvia</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: inherit;
    }

    .login-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 20px;
    }

    /* ── Brand ── */
    .login-brand {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-decoration: none;
      margin-bottom: 48px;
    }

    .login-brand-title {
      font-size: 48px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow: 0 0 40px rgba(255,255,255,.15);
    }

    .login-brand-sub {
      font-size: 13px;
      font-weight: 600;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .login-brand svg {
      width: 58px;
      height: 58px;
    }

    /* ── Card ── */
    .login-card {
      background: #111111;
      border: 1px solid #252525;
      border-radius: 20px;
      padding: 40px 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,.70);
    }

    .login-card h2 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
    }

    .login-card .login-sub {
      font-size: 13px;
      color: #666;
      margin-bottom: 28px;
    }

    .login-card label {
      display: block;
      margin: 0 0 6px;
      color: #aaa;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .login-card input[type=text],
    .login-card input[type=password] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      color: #ffffff;
      font-size: 15px;
      padding: 13px 16px;
      outline: none;
      transition: border-color .2s, background .2s;
      margin-bottom: 18px;
    }
    .login-card input[type=text]::placeholder,
    .login-card input[type=password]::placeholder { color: #3a3a3a; }
    .login-card input[type=text]:focus,
    .login-card input[type=password]:focus {
      border-color: #555;
      background: #202020;
    }

    /* ── Campo contraseña con ojito ── */
    .password-wrap {
      position: relative;
      margin-bottom: 18px;
    }
    .password-wrap input {
      margin-bottom: 0 !important;
      padding-right: 46px;
      width: 100%;
    }
    .toggle-pass {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #555;
      display: flex;
      align-items: center;
      transition: color .15s;
    }
    .toggle-pass:hover { color: #ccc; }

    /* ── Submit ── */
    .login-card button[type=submit] {
      width: 100%;
      margin-top: 8px;
      font-size: 16px;
      font-weight: 800;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #ffffff;
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background .15s, transform .1s;
    }
    .login-card button[type=submit]:hover {
      background: #e8e8e8;
      transform: translateY(-1px);
    }
    .login-card button[type=submit]:active {
      transform: translateY(0);
    }

    /* ── Alertas ── */
    .login-alert {
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .login-alert.error {
      background: rgba(180,35,24,.15);
      border: 1px solid rgba(180,35,24,.40);
      color: #f87171;
    }
    .login-alert.success {
      background: rgba(22,138,83,.15);
      border: 1px solid rgba(22,138,83,.40);
      color: #4ade80;
    }
  </style>
</head>
<body>
  <div class="login-wrap">

    <!-- ── Brand ── -->
    <a class="login-brand" th:href="@{/login}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="none" stroke="#ffffff" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <polyline points="9 21 9 12 15 12 15 21"/>
      </svg>
      <span class="login-brand-title">Solvia Store Bilbao</span>
      <span class="login-brand-sub">Base de datos</span>
    </a>

    <!-- ── Card ── -->
    <div class="login-card">
      <h2>Iniciar sesión</h2>
      <div class="login-sub">Accede con tus credenciales de equipo.</div>

      <!-- Error -->
      <div class="login-alert error" th:if="${param.error}">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Usuario o contraseña incorrectos.
      </div>

      <!-- Logout ok -->
      <div class="login-alert success" th:if="${param.logout}">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Sesión cerrada correctamente.
      </div>

      <form method="post" th:action="@{/login}">

        <label>Usuario</label>
        <input type="text" name="username"
               autocomplete="username" autofocus required
               placeholder="Tu usuario..."/>

        <label>Contraseña</label>
        <div class="password-wrap">
          <input type="password" id="passwordInput" name="password"
                 autocomplete="current-password" required
                 placeholder="••••••••"/>
          <button type="button" class="toggle-pass" id="togglePass"
                  title="Mostrar / ocultar contraseña" aria-label="Mostrar contraseña">
            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="19" height="19"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="19" height="19"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
                       a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
                       a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>

        <button type="submit">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Entrar
        </button>

      </form>
    </div>

  </div>

  <script>
    const toggleBtn = document.getElementById('togglePass');
    const passInput = document.getElementById('passwordInput');
    const eyeOpen   = document.getElementById('eyeOpen');
    const eyeClosed = document.getElementById('eyeClosed');

    toggleBtn.addEventListener('click', function () {
      const isHidden = passInput.type === 'password';
      passInput.type          = isHidden ? 'text'    : 'password';
      eyeOpen.style.display   = isHidden ? 'none'    : 'block';
      eyeClosed.style.display = isHidden ? 'block'   : 'none';
    });
  </script>
</body>
</html>
