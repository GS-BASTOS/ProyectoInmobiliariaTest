<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${title} + ' · Solvia'">Solvia</title>

  <!-- CSRF para fetch/AJAX PRUEBA GITPULL-->
  <meta name="_csrf"        th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>

<body>
<nav th:fragment="nav" class="nav">
  <a class="brand" th:href="@{/dashboard}">
    Solvia Store
  </a>

  <a th:href="@{/dashboard}">Panel Usuario</a>
  <a th:href="@{/clientes}">Clientes</a>
  <a th:href="@{/interesados}">Interesados</a>
  <a th:href="@{/proveedores}">Proveedores</a>
  <a th:href="@{/inmuebles}">Inmuebles</a>
  <a th:href="@{/visitas/programadas}">Visitas programadas</a>
  <a th:href="@{/visitas/realizadas}">Visitas realizadas</a>

  <form method="post" th:action="@{/logout}" style="margin-left:auto;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit"
            style="display:inline-flex; align-items:center; gap:6px;
                   background:transparent; border:1px solid rgba(255,255,255,.25);
                   color:inherit; font-size:13px; padding:6px 14px;
                   border-radius:8px; cursor:pointer; transition:background .15s;">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Cerrar sesión
    </button>
  </form>
</nav>
</body>
</html>
